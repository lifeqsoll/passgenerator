<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafePass & NickGen Pro</title>
    <style>
        :root {
            --bg: #ffffff; --text: #1a1a1a; --accent: #7c4dff; --card: #f5f5f7; 
            --strength-bg: #e0e0e0; --border: rgba(0,0,0,0.1); --toast-bg: #1a1a1a;
        }
        [data-theme="dark"] {
            --bg: #0b0b0e; --text: #ececec; --accent: #7c4dff; --card: rgba(18, 18, 22, 0.45); 
            --strength-bg: #333; --border: rgba(255,255,255,0.05); --toast-bg: #7c4dff;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg); color: var(--text);
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; margin: 0; padding: 20px 0;
            transition: 0.3s;
        }

        .container {
            width: 90%; max-width: 420px; padding: 24px;
            background: var(--card); border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(15px); border: 1px solid var(--border);
        }

        .tabs {
            display: flex; background: rgba(0,0,0,0.05); border-radius: 12px;
            padding: 4px; margin-bottom: 20px; gap: 4px;
        }
        [data-theme="dark"] .tabs { background: rgba(255,255,255,0.05); }

        .tab {
            flex: 1; padding: 10px; text-align: center; cursor: pointer;
            border-radius: 10px; font-size: 14px; font-weight: 500; transition: 0.2s;
        }
        .tab.active { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(124, 77, 255, 0.3); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .theme-toggle {
            cursor: pointer; background: var(--bg); border: 1px solid var(--border);
            color: var(--text); padding: 6px 12px; border-radius: 12px; font-size: 12px;
        }

        .input-group { margin-bottom: 12px; }
        
        .horizontal-group {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .horizontal-group .input-wrap { flex: 1; }
        
        label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; opacity: 0.8; }
        
        input {
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text); box-sizing: border-box; outline: none;
        }

        /* Контейнер кнопок */
        .btn-container { margin-top: 12px; }
        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .result-container {
            margin-top: 20px; padding: 16px; background: var(--bg);
            border-radius: 16px; border: 1px solid var(--border); text-align: center;
            cursor: pointer; transition: 0.2s; position: relative;
        }
        .result-container:hover { border-color: var(--accent); }
        #result { font-family: 'SF Mono', monospace; font-size: 14px; word-break: break-all; min-height: 24px; color: var(--text); }
        
        button.primary {
            width: 100%; padding: 16px; background: var(--accent); color: white;
            border: none; border-radius: 16px; font-weight: 600; cursor: pointer;
        }

        #toast {
            position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
            background: var(--toast-bg); color: white; padding: 10px 20px;
            border-radius: 20px; font-size: 14px; z-index: 100; display: none;
        }
        
        .history-section { margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; }
        .history-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .history-item {
            background: var(--bg); padding: 12px; border-radius: 12px; margin-bottom: 8px;
            font-size: 12px; border: 1px solid var(--border); position: relative;
        }
        .history-item-content { color: var(--accent); font-weight: 600; margin-top: 4px; word-break: break-all;}
        .delete-single { position: absolute; top: 10px; right: 10px; color: #ff3b30; cursor: pointer; opacity: 0.6; }

        .strength-meter { height: 4px; width: 100%; background: var(--strength-bg); margin-top: 10px; border-radius: 2px; overflow: hidden; }
        #strength-bar { height: 100%; width: 0%; transition: 0.4s; }
        .hidden { display: none !important; }
        
        .mail-hint { font-size: 11px; text-align: center; color: var(--accent); margin-top: 12px; line-height: 1.4; }
    </style>
</head>
<body data-theme="dark">

<div id="toast">Скопировано!</div>

<div class="container">
    <div class="header">
        <h2 style="margin:0; font-size: 18px; font-family: monospace;">&lt;Generator /&gt;</h2>
        <button class="theme-toggle" onclick="toggleTheme()">🌓 Тема</button>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('pass')">Пароли</div>
        <div class="tab" onclick="switchTab('nick')">Ники</div>
        <div class="tab" onclick="switchTab('mail')">Почта</div>
    </div>

    <div id="pass-section">
        <div class="input-group"><label>Длина</label><input type="number" id="len" value="12"></div>
        <div class="input-group"><label>Спецсимволы</label><input type="number" id="spec" value="2"></div>
        <div class="input-group"><label>Заглавные</label><input type="number" id="upper" value="2"></div>
        <div class="input-group"><label>Цифры</label><input type="number" id="nums" value="2"></div>
        <div class="btn-container">
            <button class="primary" onclick="handleGenPass()">Создать и копировать</button>
        </div>
    </div>

    <div id="nick-section" class="hidden">
        <div class="horizontal-group">
            <div class="input-wrap">
                <label>Ключевое слово</label>
                <input type="text" id="keyword" placeholder="ghost">
            </div>
            <label style="display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; width: auto; opacity: 1; margin-top: 18px;">
                <input type="checkbox" id="random-case" style="width:18px; height:18px; margin:0;" checked>
                <span style="font-size:10px; text-align:center; line-height:1;">Random Case</span>
            </label>
        </div>
        
        <div class="btn-container">
            <button id="gen-nick-btn" class="primary" onclick="handleGenNick()">Создать ник</button>
            <div id="nick-step-2" class="btn-row hidden">
                <button class="primary" onclick="handleGenNick()">Новый ник</button>
                <button class="primary" onclick="genPassForNick()">Пароль к нему</button>
            </div>
        </div>
    </div>

    <div id="mail-section" class="hidden">
        <button class="primary" onclick="initMail()">🌐 Открыть Guerrilla Mail</button>
        <div class="mail-hint">
            1. Скопируй адрес в открывшейся вкладке.<br>
            2. Кликни на поле «••••••••» ниже, чтобы сохранить его.
        </div>
    </div>

    <div id="result-wrapper">
        <div class="result-container" onclick="copyResult()">
            <div id="result">••••••••</div>
            <div id="strength-wrap" class="strength-meter"><div id="strength-bar"></div></div>
        </div>
    </div>

    <div class="history-section">
        <div class="history-title"> История 
            <div style="display: flex; gap: 10px;">
                <span style="font-size:11px; cursor:pointer; color:var(--accent);" onclick="exportHistory()">TXT</span>
                <span style="font-size:11px; cursor:pointer; color:#ff3b30;" onclick="clearAllHistory()">Очистить</span>
            </div>
        </div>
        <div id="history-list"></div>
    </div>
</div>

<script>
    let currentNick = "";

    const WORDS = {
        cyber: ["Neon", "Cyber", "Glitch", "Net", "Codec", "Proxy", "Data", "Static", "Zenith", "Void", "Byte", "Matrix", "Synth", "Chrome", "Bit", "Signal", "Laser", "Grid", "Chip", "Vortex", "Sudo", "Root", "Buffer", "Uplink"],
        gothic: ["Grave", "Shadow", "Soul", "Grim", "Dark", "Ghost", "Lullaby", "Abyss", "Bleak", "Silent", "Crow", "Raven", "Funeral", "Night", "Death", "Mist", "Moon", "Bone", "Blood", "Doom", "Curse", "Epitaph", "Relic"],
        anime: ["Kawaii", "Senpai", "Sama", "Chan", "Haze", "Moon", "Sakura", "Spirit", "Echo", "Mirai", "Yume", "Aura", "Mochi", "Chibi", "Kami", "Sora", "Umi", "Kira", "Neko", "Shinobi", "Ronin", "Kaiju"],
        space: ["Nova", "Orion", "Quasar", "Pulsar", "Nebula", "Astro", "Cosmo", "Lunar", "Solar", "Orbit", "Void", "Star", "Comet", "Drift", "Eclipse"],
        post: ["Witch", "Error", "Demon", "Angel", "Blade", "Star", "Zero", "Punk", "Core", "Vain", "Lord", "Killer", "Soul", "God", "Dust", "Ash", "Storm", "Rebel", "X"]
    };

    function toggleTheme() {
        const b = document.body;
        const nt = b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        b.setAttribute('data-theme', nt);
        localStorage.setItem('theme', nt);
    }

    function switchTab(type) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if(event) event.target.classList.add('active');
        
        document.getElementById('pass-section').classList.toggle('hidden', type !== 'pass');
        document.getElementById('nick-section').classList.toggle('hidden', type !== 'nick');
        document.getElementById('mail-section').classList.toggle('hidden', type !== 'mail');
        
        if(type === 'nick') resetNickUI();

        const resDiv = document.getElementById('result');
        resDiv.innerText = "••••••••";
        document.getElementById('strength-bar').style.width = '0%';
        document.getElementById('strength-wrap').classList.toggle('hidden', type !== 'pass');
    }

    function resetNickUI() {
        document.getElementById('gen-nick-btn').classList.remove('hidden');
        document.getElementById('nick-step-2').classList.add('hidden');
    }

    function showToast(text = "Скопировано!") {
        const t = document.getElementById('toast');
        t.innerText = text; t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 2000);
    }

    function initMail() {
        window.open("https://www.guerrillamail.com/", "_blank");
        document.getElementById('result').innerText = "Кликни для импорта почты из буфера";
        showToast("Сервис открыт в новой вкладке!");
    }

    function copyResult() {
        const resDiv = document.getElementById('result');
        const text = resDiv.innerText;

        if(text === "••••••••" || text.includes("Кликни") || text.includes("импорта")) {
            navigator.clipboard.readText().then(clip => {
                const clean = clip.trim();
                if(clean.includes('@') && !clean.includes('<') && clean.length < 100) {
                    resDiv.innerText = clean;
                    saveToHistory("Почта", clean);
                    showToast("Почта импортирована!");
                } else {
                    showToast("В буфере нет адреса почты!");
                }
            }).catch(() => {
                const manual = prompt("Вставь адрес почты вручную:");
                if(manual && manual.includes('@')) {
                    resDiv.innerText = manual;
                    saveToHistory("Почта", manual);
                }
            });
            return;
        }

        navigator.clipboard.writeText(text).then(() => showToast());
    }

    function genPassLogic() {
        const l = +document.getElementById('len').value, s = +document.getElementById('spec').value, 
              u = +document.getElementById('upper').value, n = +document.getElementById('nums').value;
        const chars = "abcdefghijklmnopqrstuvwxyz", ups = "ABCDEFGHIJKLMNOPQRSTUVWXYZ", nums = "0123456789", sps = "!@#$%^&*";
        let p = [];
        for(let i=0;i<s;i++) p.push(sps[Math.floor(Math.random()*sps.length)]);
        for(let i=0;i<u;i++) p.push(ups[Math.floor(Math.random()*ups.length)]);
        for(let i=0;i<n;i++) p.push(nums[Math.floor(Math.random()*nums.length)]);
        while(p.length < l) p.push(chars[Math.floor(Math.random()*chars.length)]);
        p = p.sort(() => Math.random() - 0.5).join('');
        
        const bar = document.getElementById('strength-bar');
        let str = Math.min(p.length * 7, 100);
        bar.style.width = str + '%';
        bar.style.background = str < 40 ? '#ff3b30' : (str < 70 ? '#ffcc00' : '#34c759');
        return p;
    }

    function handleGenPass() {
        const p = genPassLogic();
        document.getElementById('result').innerText = p;
        saveToHistory("Пароль", p);
        navigator.clipboard.writeText(p).then(() => showToast());
    }

    function handleGenNick() {
        const key = document.getElementById('keyword').value.trim();
        const allPre = Object.values(WORDS).flat();
        const decs = ["xX_ _Xx", "† _ †", "v_v", "｡ _ ｡", "- _ -", "[ _ ]", "666_ _666"];
        let nick = key ? (Math.random() > 0.5 ? key + WORDS.post[Math.floor(Math.random()*WORDS.post.length)] : allPre[Math.floor(Math.random()*allPre.length)] + key) 
                       : allPre[Math.floor(Math.random()*allPre.length)] + WORDS.post[Math.floor(Math.random()*WORDS.post.length)];
        
        if(Math.random() > 0.7) nick = decs[Math.floor(Math.random()*decs.length)].replace("_", nick);
        
        if(document.getElementById('random-case').checked) {
            nick = nick.split('').map(c => Math.random() > 0.5 ? c.toUpperCase() : c.toLowerCase()).join('');
        }
        
        currentNick = nick;
        document.getElementById('result').innerText = nick;
        
        document.getElementById('gen-nick-btn').classList.add('hidden');
        document.getElementById('nick-step-2').classList.remove('hidden');
        
        navigator.clipboard.writeText(nick).then(() => showToast("Ник скопирован!"));
    }

    function genPassForNick() {
        const p = genPassLogic();
        saveToHistory(currentNick, p);
        document.getElementById('result').innerHTML = `<span style="color:var(--accent)">${currentNick}</span><br><small style="opacity:0.7">${p}</small>`;
        resetNickUI();
        navigator.clipboard.writeText(p).then(() => showToast("Пароль скопирован!"));
    }

    function saveToHistory(label, val) {
        let h = JSON.parse(localStorage.getItem('gen_history') || '[]');
        h.unshift({ id: Date.now(), label, val, time: new Date().toLocaleTimeString() });
        localStorage.setItem('gen_history', JSON.stringify(h.slice(0, 15)));
        renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        const h = JSON.parse(localStorage.getItem('gen_history') || '[]');
        list.innerHTML = h.map(i => `
            <div class="history-item">
                <span class="delete-single" onclick="deleteItem(${i.id})">×</span>
                <span style="opacity:0.5; font-size:10px;">[${i.time}]</span>
                <div class="history-item-content">${i.label}: ${i.val}</div>
            </div>
        `).join('');
    }

    function exportHistory() {
        const h = JSON.parse(localStorage.getItem('gen_history') || '[]');
        if(!h.length) return showToast("История пуста");
        const txt = h.map(i => `[${i.time}] ${i.label}: ${i.val}`).join('\n');
        const blob = new Blob([txt], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'history.txt'; a.click();
    }

    function deleteItem(id) {
        let h = JSON.parse(localStorage.getItem('gen_history') || '[]').filter(i => i.id !== id);
        localStorage.setItem('gen_history', JSON.stringify(h));
        renderHistory();
    }

    function clearAllHistory() { if(confirm("Очистить?")) { localStorage.removeItem('gen_history'); renderHistory(); } }

    window.onload = () => {
        const theme = localStorage.getItem('theme') || 'dark';
        document.body.setAttribute('data-theme', theme);
        renderHistory();
    };
</script>
</body>
</html>
